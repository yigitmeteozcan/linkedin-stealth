name: LinkedIn Stealth Tracker

# Add ENRICHLAYER_API_KEY to your repo secrets:
# GitHub repo → Settings → Secrets and variables → Actions → New secret
# Name: ENRICHLAYER_API_KEY
# Value: your key from enrichlayer.com

on:
  schedule:
    - cron: '0 9 1,15 * *'   # twice a month: 1st and 15th at 9am UTC
  workflow_dispatch:           # manual run button

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Restore state cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: state.json
          key: stealth-state-${{ github.ref_name }}-v1
          restore-keys: stealth-state-${{ github.ref_name }}-

      - name: Audit dependencies
        run: |
          pip install pip-audit -q
          pip-audit -r requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          ENRICHLAYER_API_KEY: ${{ secrets.ENRICHLAYER_API_KEY }}
        run: python tracker.py

      - name: Commit results
        run: |
          git config user.name "stealth-watch[bot]"
          git config user.email "stealth-watch@users.noreply.github.com"
          git add results.md
          git diff --staged --quiet || git commit -m "chore: stealth watch run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
