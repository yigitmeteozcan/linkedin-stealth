name: Stealth Watch

on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        run: python tracker.py

      - name: Commit results
        run: |
          git config user.name "stealth-watch[bot]"
          git config user.email "stealth-watch@users.noreply.github.com"
          git add state.json results.md
          git diff --staged --quiet || git commit -m "chore: stealth watch run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
